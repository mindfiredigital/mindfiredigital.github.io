name: Continuous Integration Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Runs every night at 12 am UTC

jobs:
  build:
    name: 'Build Mindfire FOSS application'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Install dependencies'
        run: npm install

      - name: 'Build application'
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
      
      - name: 'Restore changes in json'
        run: |
          git restore src/app/projects/assets/upcomingProjects.json
          git restore src/app/projects/assets/projects.json
          git restore src/app/projects/assets/contributors.json
          git restore src/app/projects/assets/stats.json
          git restore src/app/projects/assets/packages.json
          git restore src/app/projects/assets/projects_grouped.json
          git restore src/app/projects/assets/contributor-mapping.json
          git restore src/app/projects/assets/leaderboard-cache.json
          git restore src/app/projects/assets/leaderboard-monthly.json

      - name: 'Fetch branches'
        run: git fetch origin
      
      - name: 'Set Git user name and email'
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: 'Copy leaderboard data to temp before branch switch'
        run: |
          mkdir -p /tmp/leaderboard-data
          cp -r public/leaderboard/* /tmp/leaderboard-data/
          cp public/asset/*.json /tmp/leaderboard-data/

      - name: 'Restore generated leaderboard files to allow branch switch'
        run: |
          git restore public/leaderboard/
          git restore public/asset/

      - name: 'Copy build artifacts to gh-pages branch'
        run: |
          mkdir /tmp/temp-directory
          shopt -s dotglob
          cp -r build/* /tmp/temp-directory/
          shopt -u dotglob
          # Include generated leaderboard data
          mkdir -p /tmp/temp-directory/leaderboard
          cp -r /tmp/leaderboard-data/* /tmp/temp-directory/leaderboard/
          git checkout gh-pages
          rm -rf *
          rm -rf .nojekyll
          shopt -s dotglob
          cp -r /tmp/temp-directory/* .
          shopt -u dotglob

      - name: 'Commit and push to gh-pages if changes exist'
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add . -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Copy build artifacts from main to gh-pages branch"
            git push origin gh-pages
          fi

      - name: 'Switch back to main branch'
        run: |
          git checkout main 
          
  create-github-release:
    name: Create Github release document
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v2

      - name: Semantic Release
        run: npx semantic-release@22.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}